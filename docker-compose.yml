version: '3.8'

services:
  db:
    image: postgres:15
    container_name: symphony-db
    restart: always
    environment:
      POSTGRES_DB: symphony
      POSTGRES_USER: symphony_user
      POSTGRES_PASSWORD: symphony_pass
    ports:
      - "5432:5432"
    volumes:
      - symphony_data:/var/lib/postgresql/data

volumes:
  symphony_data:
